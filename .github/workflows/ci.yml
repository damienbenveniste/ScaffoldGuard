name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check with mypy
        run: uv run mypy src tests

      - name: Type check with Pyright
        run: uv run pyright

      - name: Test
        run: uv run pytest tests --cov=scaffold_guard --cov-report=term-missing --cov-fail-under=95

      - name: Build docs
        run: uv run mkdocs build --strict

  build-wheel:
    name: Build wheel
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"

      - name: Build distribution
        run: uv build --wheel

      - name: Inspect wheel contents
        run: python scripts/inspect-wheel.py dist/scaffold_guard-*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: scaffold-guard-wheel
          path: dist/*.whl
          if-no-files-found: error

  smoke-generated-project:
    name: Smoke generated ${{ matrix.profile }}
    runs-on: ubuntu-latest
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        profile: ["minimal", "python", "typescript", "monorepo"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: scaffold-guard-wheel
          path: dist

      - name: Smoke generated project
        run: bash scripts/smoke-generated-project.sh "${{ matrix.profile }}" dist
